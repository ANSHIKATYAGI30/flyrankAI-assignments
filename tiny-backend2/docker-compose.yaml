version: "3.9"

services:

  db:

    image: postgres:16

    restart: always

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: password

      POSTGRES_DB: tinybackend

    ports:
      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  app:

    build: .

    ports:
      - "5000:5000"

    depends_on:
      - db

    env_file:
      - .env

volumes:

  postgres_data: